# SonarCloud project descriptor — also read by `sonar-scanner` if no
# `-D` flags are passed. Kept in sync with the values in .gitlab-ci/quality.yml
# so local-run + CI-run produce the same analysis.
#
# Run locally :
#   export SONAR_TOKEN=...
#   sonar-scanner

sonar.host.url=https://sonarcloud.io
sonar.organization=mirador1
sonar.projectKey=mirador1_mirador-service-python
sonar.projectName=Mirador Service (Python)

sonar.sources=src
sonar.tests=tests
sonar.python.version=3.14

# Coverage report from pytest-cov (cobertura XML at coverage.xml).
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions : auto-generated + ephemeral content.
sonar.exclusions=**/__pycache__/**,**/migrations/**,alembic/**,htmlcov/**

# Quality gate : don't wait synchronously (background poll instead).
sonar.qualitygate.wait=false
