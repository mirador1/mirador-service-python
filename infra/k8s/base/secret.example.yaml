# EXAMPLE Secret — DO NOT commit real credentials.
#
# In production, this Secret is provisioned by external-secrets-operator
# pulling from the cluster's secret backend (Vault / GCP Secret Manager /
# AWS Secrets Manager / OVH KMS).
#
# For local k8s deployment via kind / minikube, copy this to
# `secret.local.yaml` (gitignored), fill in real values, and apply
# alongside kustomize overlays.
apiVersion: v1
kind: Secret
metadata:
  name: mirador-service-python-secrets
  namespace: mirador
  labels:
    app.kubernetes.io/name: mirador-service-python
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: mirador
type: Opaque
stringData:
  # Postgres password — match the postgres deployment's credentials
  MIRADOR_DB__PASSWORD: "REPLACE_ME_postgres_password"

  # JWT signing secret — at least 32 random bytes hex-encoded.
  # Generate via : python -c "import secrets; print(secrets.token_urlsafe(64))"
  MIRADOR_JWT__SECRET: "REPLACE_ME_jwt_secret_min_32_chars_random"
