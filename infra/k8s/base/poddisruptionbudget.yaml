apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mirador-service-python
  namespace: mirador
  labels:
    app.kubernetes.io/name: mirador-service-python
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: mirador
spec:
  # minAvailable: 1 means at most (replicas-1) pods can be evicted at once.
  # With replicas=2 this lets a single node drain proceed while keeping the
  # service serving requests (no full outage during cluster maintenance).
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mirador-service-python
