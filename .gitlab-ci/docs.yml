# Docs stage : mkdocs-material build + GitLab Pages publish
#
# Mirror of UI's compodoc + svc's javadoc generation. Static site at
# https://mirador1.gitlab.io/mirador-service-python/ updated on every
# main push. PR builds run mkdocs build but don't publish.

pages:
  stage: deploy
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  tags:
    - macbook-local
  needs:
    - unit-tests
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run mkdocs build --site-dir public
  artifacts:
    paths:
      - public
    expire_in: 30 days
  environment:
    name: docs
    url: https://mirador1.gitlab.io/mirador-service-python/
  allow_failure: true  # docs failure doesn't gate pipeline

docs:check:
  stage: validate
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  tags:
    - macbook-local
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "docs/**/*"
        - "mkdocs.yml"
        - "src/**/*.py"  # docstrings drive autodoc
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run mkdocs build --strict
  allow_failure: true
