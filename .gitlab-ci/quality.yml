# Quality stage : SonarCloud analysis (mirror of svc sonarcloud job)
#
# Reuses the existing SonarCloud organization `mirador1` (svc + UI projects
# already imported). The Python project key is `mirador1_mirador-service-python`.
#
# Setup (one-time, manual via SonarCloud UI) :
#   1. Visit https://sonarcloud.io/projects/create → import GitLab project
#      `mirador1/mirador-service-python` into the `mirador1` org.
#   2. Generate a token at https://sonarcloud.io/account/security
#   3. Set GitLab CI variable `SONAR_TOKEN` (group-level, masked).
#
# Runs after unit-tests so coverage.xml is uploaded.

# pip-audit — CVE scanning of pyproject.toml + uv.lock against PyPI
# Advisory Database. Mirror of npm-audit (UI side) + OWASP DC (Java side).
# Per ADR-0007 §9 ("CVE checks TODO") + global CLAUDE.md "pin every
# upstream reference" rule — pinning is half the story, the other half
# is knowing when a pinned version becomes vulnerable.
#
# Strict mode : fails on ANY known vuln (no severity floor). For a
# portfolio demo this is fine ; production projects often exempt LOW
# until they ship a fix, via `--ignore-vuln <PYSEC-id>` flags + dated
# review tickets. Stays in the validate stage so it gates merges.
pip-audit:
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  stage: validate
  tags:
    - macbook-local
  needs: []
  before_script:
    - uv sync --all-extras --frozen
  script:
    # Audit the active virtualenv (= what uv actually installed). pip-audit
    # returns non-zero on ANY vuln — no --strict flag needed (that's the
    # default). The trailing "Skip Reason" line for our own mirador-service
    # package is informational, doesn't break the exit code.
    #
    # No --ignore-vuln flags currently carried — CVE-2026-3219 (pip 26.0.1)
    # was the last shield, dropped 2026-04-27 after pip 26.1 shipped the fix.
    # Re-add a dated `--ignore-vuln <ID>` line ONLY for vulns with no upstream
    # fix released ; comment the date + recheck cadence.
    - uv run pip-audit
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  # No allow_failure : pip-audit MUST stay green. New CVE = blocked merge
  # = forced bump. The point is to never silently ship a known-vulnerable
  # version.

sonarcloud:
  # stage: test (was validate) — sonarcloud needs the coverage.xml artifact
  # produced by unit-tests, so it MUST run in test or later. Putting it in
  # validate caused a structural error : "needs unit-tests is not defined
  # in current or prior stages". Fixed 2026-04-25.
  stage: test
  image: sonarsource/sonar-scanner-cli:11.5.0.2154_7.3.0
  tags:
    - macbook-local
  needs:
    - unit-tests
  rules:
    # Run on main + every MR. Skip if SONAR_TOKEN missing (e.g. forks).
    - if: $SONAR_TOKEN == null
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    SONAR_USER_HOME: "$CI_PROJECT_DIR/.sonar"
    GIT_DEPTH: "0"  # SonarCloud needs full history for blame
  cache:
    key: sonar-${CI_PROJECT_NAME}
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
        -Dsonar.host.url=https://sonarcloud.io
        -Dsonar.organization=mirador1
        -Dsonar.projectKey=mirador1_mirador-service-python
        -Dsonar.projectName="Mirador Service (Python)"
        -Dsonar.sources=src
        -Dsonar.tests=tests
        -Dsonar.python.coverage.reportPaths=coverage.xml
        -Dsonar.python.version=3.13
        -Dsonar.exclusions="**/__pycache__/**,**/migrations/**,alembic/**"
        -Dsonar.qualitygate.wait=false
  allow_failure: true  # TODO 2026-05-25 — flip after first 5 green runs
