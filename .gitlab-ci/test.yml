# Test stage : pytest unit + integration (testcontainers)

.uv-base: &uv-base
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  tags:
    - macbook-local
  before_script:
    - uv sync --all-extras --frozen
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .venv/

unit-tests:
  <<: *uv-base
  stage: test
  script:
    - uv run pytest tests/unit -v --junitxml=junit-unit.xml --cov=mirador_service --cov-report=xml
  artifacts:
    when: always
    reports:
      junit: junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days

# Note : the import-linter job lives in .gitlab-ci/lint.yml — it shares
# the .uv-base anchor there + has cleaner stage/needs wiring. Don't
# re-define it here.

# Microbenchmarks — JMH equivalent (mirror Java side's perf gates).
# Per ADR-0007 §13. Hot paths : JWT encode/decode + bcrypt hash/verify.
# JSON output uploaded as artifact ; future job can compare across runs
# for delta tracking. Manual on every MR ; main triggers automatically.
benchmarks:
  <<: *uv-base
  stage: test
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  script:
    # --no-cov : benchmarks exercise 6 functions only ; the global --cov-fail-under=90
    # in pyproject.toml addopts would always fail this job.
    - uv run pytest tests/benchmarks --benchmark-only -m benchmarks --benchmark-json=benchmark.json --no-cov
  artifacts:
    when: always
    paths:
      - benchmark.json
    expire_in: 90 days
  allow_failure: true  # informational ; flip to false if regressions become a real risk

integration-tests:
  <<: *uv-base
  stage: test
  needs:
    - unit-tests
  rules:
    # Integration tests use testcontainers — they spawn Postgres + Kafka via
    # the host Docker socket (mounted into the macbook-local runner via
    # `volumes = ["/var/run/docker.sock:/var/run/docker.sock"]` in the
    # runner config). NO docker:dind needed because we're already on a
    # runner WITH Docker access ; dind would require privileged=true which
    # our local runner intentionally doesn't have.
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  services:
    # Postgres service for tests that prefer GitLab-provided over testcontainers.
    # Currently unused (testcontainers spawn their own) but available for
    # tests that flip to env-driven DSN via MIRADOR_DB__* in CI.
    - name: postgres:16.6-alpine
      alias: postgres
  variables:
    # NO DOCKER_HOST override : testcontainers picks up the host socket via
    # /var/run/docker.sock (mounted into the runner). Setting DOCKER_HOST to
    # a tcp:// URL would override the socket detection and fail.
    POSTGRES_DB: mirador
    POSTGRES_USER: mirador
    POSTGRES_PASSWORD: mirador
    # When tests want to use the GitLab postgres service, MIRADOR_DB__* picks up
    # the alias hostname.
    MIRADOR_DB__HOST: postgres
    MIRADOR_DB__USER: mirador
    MIRADOR_DB__PASSWORD: mirador
    MIRADOR_DB__NAME: mirador
    # Disable testcontainers' ryuk reaper — it spawns a sidecar container
    # named `testcontainers-ryuk-<UUID>` that lingers between CI jobs on
    # the macbook-local runner ; subsequent jobs hit a 409 Docker conflict
    # (`Conflict. The container name "/testcontainers-ryuk-…" is already
    # in use`) and the test session never starts. Discovered 2026-04-27 :
    # 0/23 consecutive green runs of integration-tests on main, ALL
    # blocked at ryuk session creation. Disabling ryuk works because
    # our integration tests use proper context managers (`with`
    # PostgresContainer / KafkaContainer) that clean up via SIGTERM at
    # session end ; ryuk's SIGKILL safety-net is disposable on a
    # single-runner setup that prunes containers via the
    # CLAUDE.md-cadenced `docker container prune -f`. Re-enable when
    # ryuk gains a per-job container-name strategy.
    TESTCONTAINERS_RYUK_DISABLED: "true"
  script:
    # --no-cov : integration tests don't exercise the full app, only
    # adapter paths ; the global --cov-fail-under=90 in pyproject.toml
    # would always fail this job. Coverage is measured by unit-tests.
    - uv run pytest tests/integration -v -m integration --junitxml=junit-integration.xml --no-cov
  artifacts:
    when: always
    reports:
      junit: junit-integration.xml
    expire_in: 30 days
  allow_failure: true  # TODO 2026-05-25 — flip after 5 consecutive green runs

# Compat matrix : same tests on different Python versions
.compat-base: &compat-base
  stage: compat
  tags:
    - macbook-local
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $RUN_COMPAT == "true"
      when: on_success
    - when: manual
  allow_failure: true
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run pytest tests/unit -v

# Compat matrix : 3.14 = default (in unit-tests + integration-tests above) ;
# 3.12 + 3.13 = informational fallbacks. 3.11 dropped 2026-04-25 (less than
# 18 months before EOL = 2027-10) — not worth maintaining.

compat-py312:
  <<: *compat-base
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim

compat-py313:
  <<: *compat-base
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
