# Test stage : pytest unit + integration (testcontainers)

.uv-base: &uv-base
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  tags:
    - macbook-local
  before_script:
    - uv sync --all-extras --frozen
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .venv/

unit-tests:
  <<: *uv-base
  stage: test
  script:
    - uv run pytest tests/unit -v --junitxml=junit-unit.xml --cov=mirador_service --cov-report=xml
  artifacts:
    when: always
    reports:
      junit: junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days

integration-tests:
  <<: *uv-base
  stage: test
  needs:
    - unit-tests
  rules:
    # Integration tests need testcontainers (Docker socket) — primary path
    # is macbook-local (already has Docker). When that runner is offline,
    # the docker:dind service block lets the job fall back to any GitLab
    # runner with privileged mode (SaaS or self-hosted) — testcontainers
    # connects to the nested Docker via DOCKER_HOST=tcp://docker:2375.
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  services:
    # docker:dind for testcontainers nested-container spawn (Postgres / Kafka).
    # Pin major to dodge breaking changes on `:latest`.
    - name: docker:28-dind
      alias: docker
      command: ["--tls=false"]  # tls=false for in-cluster comm via tcp://docker:2375
    # Postgres service for tests that prefer GitLab-provided over testcontainers.
    # Currently unused (testcontainers spawn their own) but available for
    # tests that flip to env-driven DSN via MIRADOR_DB__* in CI.
    - name: postgres:16.6-alpine
      alias: postgres
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""  # disable TLS, we're inside the same network namespace
    POSTGRES_DB: mirador
    POSTGRES_USER: mirador
    POSTGRES_PASSWORD: mirador
    # When tests want to use the GitLab postgres service, MIRADOR_DB__* picks up
    # the alias hostname.
    MIRADOR_DB__HOST: postgres
    MIRADOR_DB__USER: mirador
    MIRADOR_DB__PASSWORD: mirador
    MIRADOR_DB__NAME: mirador
  script:
    - uv run pytest tests/integration -v -m integration --junitxml=junit-integration.xml
  artifacts:
    when: always
    reports:
      junit: junit-integration.xml
    expire_in: 30 days
  allow_failure: true  # TODO 2026-05-25 — flip after 5 consecutive green runs

# Compat matrix : same tests on different Python versions
.compat-base: &compat-base
  stage: compat
  tags:
    - macbook-local
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $RUN_COMPAT == "true"
      when: on_success
    - when: manual
  allow_failure: true
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run pytest tests/unit -v

compat-py311:
  <<: *compat-base
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim

compat-py312:
  <<: *compat-base
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim

compat-py314:
  <<: *compat-base
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
