# =============================================================================
# deploy/kubernetes/observability-prom/mirador-py-slo.yaml
#
# Python service SLO recording + multi-window multi-burn-rate alerting rules.
# Generated by Sloth from `mirador-service-python/docs/slo/slo.yaml`,
# wrapped as PrometheusRule CRD by `wrap-as-prometheusrule.py`.
#
# Same pattern as the Java side's mirador-slo.yaml ; both are picked up by
# the kube-prometheus-stack operator via the `release: prometheus-stack`
# ruleSelector label.
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mirador-py-slo
  labels:
    release: prometheus-stack
    role: alert-rules
    app.kubernetes.io/part-of: mirador
    app.kubernetes.io/component: python-service
spec:
  groups:
  - name: sloth-slo-sli-recordings-mirador-service-python-availability
    rules:
    - record: slo:sli_error:ratio_rate5m
      expr: '(sum(rate(starlette_requests_total{job="mirador-service-python",status_code=~"5.."}[5m]))

        )

        /

        (sum(rate(starlette_requests_total{job="mirador-service-python"}[5m]))

        )

        '
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        sloth_window: 5m
        team: mirador
        tier: demo
    - record: slo:sli_error:ratio_rate30m
      expr: '(sum(rate(starlette_requests_total{job="mirador-service-python",status_code=~"5.."}[30m]))

        )

        /

        (sum(rate(starlette_requests_total{job="mirador-service-python"}[30m]))

        )

        '
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        sloth_window: 30m
        team: mirador
        tier: demo
    - record: slo:sli_error:ratio_rate1h
      expr: '(sum(rate(starlette_requests_total{job="mirador-service-python",status_code=~"5.."}[1h]))

        )

        /

        (sum(rate(starlette_requests_total{job="mirador-service-python"}[1h]))

        )

        '
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        sloth_window: 1h
        team: mirador
        tier: demo
    - record: slo:sli_error:ratio_rate2h
      expr: '(sum(rate(starlette_requests_total{job="mirador-service-python",status_code=~"5.."}[2h]))

        )

        /

        (sum(rate(starlette_requests_total{job="mirador-service-python"}[2h]))

        )

        '
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        sloth_window: 2h
        team: mirador
        tier: demo
    - record: slo:sli_error:ratio_rate6h
      expr: '(sum(rate(starlette_requests_total{job="mirador-service-python",status_code=~"5.."}[6h]))

        )

        /

        (sum(rate(starlette_requests_total{job="mirador-service-python"}[6h]))

        )

        '
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        sloth_window: 6h
        team: mirador
        tier: demo
    - record: slo:sli_error:ratio_rate1d
      expr: '(sum(rate(starlette_requests_total{job="mirador-service-python",status_code=~"5.."}[1d]))

        )

        /

        (sum(rate(starlette_requests_total{job="mirador-service-python"}[1d]))

        )

        '
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        sloth_window: 1d
