        )

        /

        (sum(rate(starlette_requests_total{job="mirador-service-python"}[3d]))

        )

        '
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        sloth_window: 3d
        team: mirador
        tier: demo
    - record: slo:sli_error:ratio_rate30d
      expr: 'sum_over_time(slo:sli_error:ratio_rate5m{sloth_id="mirador-service-python-availability", sloth_service="mirador-service-python",
        sloth_slo="availability"}[30d])

        / ignoring (sloth_window)

        count_over_time(slo:sli_error:ratio_rate5m{sloth_id="mirador-service-python-availability", sloth_service="mirador-service-python",
        sloth_slo="availability"}[30d])

        '
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        sloth_window: 30d
        team: mirador
        tier: demo
  - name: sloth-slo-meta-recordings-mirador-service-python-availability
    rules:
    - record: slo:objective:ratio
      expr: vector(0.99)
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        team: mirador
        tier: demo
    - record: slo:error_budget:ratio
      expr: vector(1-0.99)
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        team: mirador
        tier: demo
    - record: slo:time_period:days
      expr: vector(30)
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        team: mirador
        tier: demo
    - record: slo:current_burn_rate:ratio
      expr: 'slo:sli_error:ratio_rate5m{sloth_id="mirador-service-python-availability", sloth_service="mirador-service-python",
        sloth_slo="availability"}

        / on(sloth_id, sloth_slo, sloth_service) group_left

        slo:error_budget:ratio{sloth_id="mirador-service-python-availability", sloth_service="mirador-service-python", sloth_slo="availability"}

        '
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        team: mirador
        tier: demo
    - record: slo:period_burn_rate:ratio
      expr: 'slo:sli_error:ratio_rate30d{sloth_id="mirador-service-python-availability", sloth_service="mirador-service-python",
