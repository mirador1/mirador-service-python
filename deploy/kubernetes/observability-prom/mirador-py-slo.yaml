      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_service: mirador-service-python
        sloth_slo: availability
        team: mirador
        tier: demo
    - record: sloth_slo_info
      expr: vector(1)
      labels:
        app: mirador-service-python
        sloth_id: mirador-service-python-availability
        sloth_mode: cli-gen-prom
        sloth_objective: '99'
        sloth_service: mirador-service-python
        sloth_slo: availability
        sloth_spec: prometheus/v1
        sloth_version: 0.16.0
        team: mirador
        tier: demo
  - name: sloth-slo-alerts-mirador-service-python-availability
    rules:
    - alert: MiradorPyServiceAvailabilitySLO
      expr: "(\n    max(slo:sli_error:ratio_rate5m{sloth_id=\"mirador-service-python-availability\", sloth_service=\"mirador-service-python\"\
        , sloth_slo=\"availability\"} > (14.4 * 0.01)) without (sloth_window)\n    and\n    max(slo:sli_error:ratio_rate1h{sloth_id=\"\
        mirador-service-python-availability\", sloth_service=\"mirador-service-python\", sloth_slo=\"availability\"} > (14.4\
        \ * 0.01)) without (sloth_window)\n)\nor\n(\n    max(slo:sli_error:ratio_rate30m{sloth_id=\"mirador-service-python-availability\"\
        , sloth_service=\"mirador-service-python\", sloth_slo=\"availability\"} > (6 * 0.01)) without (sloth_window)\n   \
        \ and\n    max(slo:sli_error:ratio_rate6h{sloth_id=\"mirador-service-python-availability\", sloth_service=\"mirador-service-python\"\
        , sloth_slo=\"availability\"} > (6 * 0.01)) without (sloth_window)\n)\n"
      labels:
        category: availability
        channel: pager
        severity: critical
        sloth_severity: page
      annotations:
        runbook_url: https://gitlab.com/mirador1/mirador-service-python/-/blob/main/docs/runbooks/slo-availability.md
        summary: Availability SLO error budget burning
        title: (page) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget burn rate is too fast.
    - alert: MiradorPyServiceAvailabilitySLO
      expr: "(\n    max(slo:sli_error:ratio_rate2h{sloth_id=\"mirador-service-python-availability\", sloth_service=\"mirador-service-python\"\
        , sloth_slo=\"availability\"} > (3 * 0.01)) without (sloth_window)\n    and\n    max(slo:sli_error:ratio_rate1d{sloth_id=\"\
        mirador-service-python-availability\", sloth_service=\"mirador-service-python\", sloth_slo=\"availability\"} > (3\
        \ * 0.01)) without (sloth_window)\n)\nor\n(\n    max(slo:sli_error:ratio_rate6h{sloth_id=\"mirador-service-python-availability\"\
        , sloth_service=\"mirador-service-python\", sloth_slo=\"availability\"} > (1 * 0.01)) without (sloth_window)\n   \
        \ and\n    max(slo:sli_error:ratio_rate3d{sloth_id=\"mirador-service-python-availability\", sloth_service=\"mirador-service-python\"\
        , sloth_slo=\"availability\"} > (1 * 0.01)) without (sloth_window)\n)\n"
      labels:
        category: availability
        channel: ticket
        severity: warning
        sloth_severity: ticket
      annotations:
        runbook_url: https://gitlab.com/mirador1/mirador-service-python/-/blob/main/docs/runbooks/slo-availability.md
        summary: Availability SLO error budget burning
        title: (ticket) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget burn rate is too fast.
  - name: sloth-slo-sli-recordings-mirador-service-python-latency-p99
    rules:
    - record: slo:sli_error:ratio_rate5m
      expr: "((\n  sum(rate(starlette_request_duration_seconds_count{job=\"mirador-service-python\"}[5m]))\n  -\n  sum(rate(starlette_request_duration_seconds_bucket{job=\"\
        mirador-service-python\",le=\"0.5\"}[5m]))\n)\n)\n/\n(sum(rate(starlette_request_duration_seconds_count{job=\"mirador-service-python\"\
        }[5m]))\n)\n"
      labels:
