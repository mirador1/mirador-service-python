# Mirror of mirador-service Java pipeline (modular structure under .gitlab-ci/).
# Lanes :
# ┌─ REGULAR (every MR + main push) ─────────────────────────────────────────┐
# │   lint        ruff + mypy                                                │
# │   test        pytest unit (mocked)                                       │
# │   integration pytest -m integration (testcontainers postgres/redis/kafka)│
# │   package     docker build (multi-stage, multi-arch)                     │
# └──────────────────────────────────────────────────────────────────────────┘
#
# ┌─ MANUAL : compat matrix ────────────────────────────────────────────────┐
# │   compat-py311 / compat-py312 / compat-py314 — same tests on different  │
# │   Python versions (informational, defines compat support claim)         │
# └─────────────────────────────────────────────────────────────────────────┘

include:
  - local: .gitlab-ci/lint.yml
  - local: .gitlab-ci/test.yml
  - local: .gitlab-ci/quality.yml
  - local: .gitlab-ci/build.yml
  - local: .gitlab-ci/deploy.yml
  - local: .gitlab-ci/docs.yml

workflow:
  # Mirror Java's allowlist pattern : only run pipeline when changes touch
  # a code/build/infra/CI/doc path. Avoids burning runner quota on doc-only
  # MRs that don't need a full pipeline (but still must satisfy branch
  # protection's "ci_must_pass" rule via a mostly-skipped pipeline).
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "src/**/*"
        - "tests/**/*"
        - "alembic/**/*"
        - "pyproject.toml"
        - "uv.lock"
        - "Dockerfile*"
        - ".dockerignore"
        - "docker-compose*.yml"
        - ".gitlab-ci.yml"
        - ".gitlab-ci/**/*"
        - "infra/**/*"
        - "bin/**/*"
        - "docs/**/*"
        - "README.md"
        - "CLAUDE.md"
        - "TASKS.md"
        - ".env.example"
    # Push on main OR dev triggers pipeline. We need BOTH explicitly because :
    # - default_branch=main (per project settings, matches the convention) → main pushes match.
    # - dev is the working branch where commits land first, MUST also trigger pipelines
    #   (not the default_branch). Without this explicit `dev` rule, every dev push
    #   was silently ignored after we corrected default_branch from dev → main on
    #   2026-04-25 (root cause of "post-merge main pipelines never ran").
    - if: $CI_COMMIT_BRANCH =~ /^(main|dev)$/ && $CI_PIPELINE_SOURCE != "schedule"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - validate
  - test
  - package
  - deploy
  - compat

variables:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.11.2"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
